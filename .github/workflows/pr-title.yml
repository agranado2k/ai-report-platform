name: PR title (Conventional Commits)

# Squash-merge writes the PR title as the commit on `main`, so the PR
# title is what `semantic-release` will actually parse. Enforce the
# Conventional Commits format on it (ADR-033).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Standard Conventional Commits types (see commitlint.config.js
          # — must stay in sync; the commit-msg hook covers individual
          # commits, this job covers the squash-merge title).
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.{1,100}$
          subjectPatternError: |
            The PR title's subject (after the `type:` prefix) must be
            1-100 characters. Got "{subject}".
