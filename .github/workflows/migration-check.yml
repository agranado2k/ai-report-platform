name: Migration check

# Proves the committed Drizzle migrations apply cleanly, on every PR that
# touches the schema. Forward-only (ADR-019, docs/db-design.md): we spin up an
# ephemeral Neon branch forked from prod, apply the full migration set against
# it, then delete the branch — the branch deletion IS the rollback, so prod is
# never touched here. Migrations only ever run through CI/CD, never by hand.
#
# Needs NEON_API_KEY (secret) + NEON_PROJECT_ID (variable); both already set.
# PRD: GitHub issue #13.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/db/**"
      - ".github/workflows/migration-check.yml"

permissions:
  contents: read

concurrency:
  group: migration-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NEON_API: https://console.neon.tech/api/v2
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_DATABASE: ai_report_platform
  NEON_ROLE: app

jobs:
  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack + pnpm 10
        run: |
          corepack enable
          corepack prepare pnpm@10.5.0 --activate

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Fast, DB-less: validates the ./drizzle folder + journal are consistent
      # (catches colliding NNNN_* migrations from parallel PRs) before we pay
      # for a Neon branch.
      - name: Migration folder consistency (drizzle-kit check)
        run: pnpm --filter arp-db run db:check

      - name: Create ephemeral Neon branch
        id: branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          # Self-heal: delete any leftover branches from earlier runs of THIS PR
          # (cancel-in-progress means no concurrent run competes for them).
          for b in $(curl -s "$NEON_API/projects/$NEON_PROJECT_ID/branches" \
              -H "Authorization: Bearer $NEON_API_KEY" \
              | jq -r --arg p "ci-pr-$pr-" '.branches[] | select(.name | startswith($p)) | .id'); do
            curl -s -X DELETE "$NEON_API/projects/$NEON_PROJECT_ID/branches/$b" \
              -H "Authorization: Bearer $NEON_API_KEY" >/dev/null && echo "swept stale branch $b" || true
          done

          name="ci-pr-$pr-${{ github.run_id }}"
          resp=$(curl -s -w $'\n%{http_code}' -X POST "$NEON_API/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"$name\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Neon branch create returned HTTP $code"; echo "$body"; exit 1
          fi
          branch_id=$(printf '%s' "$body" | jq -r '.branch.id // empty')
          if [ -z "$branch_id" ]; then
            echo "::error::created branch but could not parse .branch.id"
            echo "response keys: $(printf '%s' "$body" | jq -c 'keys')"; exit 1
          fi
          # Persist the id IMMEDIATELY so teardown always runs (no orphans).
          echo "branch_id=$branch_id" >> "$GITHUB_OUTPUT"

          # Derive the actual db + owning role from the create response (the
          # hardcoded names 404'd — discover instead of assume).
          db_name=$(printf '%s' "$body" | jq -r '.databases[0].name // empty')
          role_name=$(printf '%s' "$body" | jq -r '.databases[0].owner_name // .roles[0].name // empty')
          echo "branch databases: $(printf '%s' "$body" | jq -c '[.databases[].name]') roles: $(printf '%s' "$body" | jq -c '[.roles[].name]')"
          if [ -z "$db_name" ] || [ -z "$role_name" ]; then
            echo "::error::branch $branch_id has no database/role to connect with"; exit 1
          fi

          # The create response carries no connection URI — fetch it from the
          # dedicated endpoint (retry; the new endpoint may need a moment). The
          # URI holds the role password, so never echo it.
          uri=""
          for attempt in 1 2 3 4; do
            uresp=$(curl -s -w $'\n%{http_code}' -G "$NEON_API/projects/$NEON_PROJECT_ID/connection_uri" \
              -H "Authorization: Bearer $NEON_API_KEY" \
              --data-urlencode "branch_id=$branch_id" \
              --data-urlencode "database_name=$db_name" \
              --data-urlencode "role_name=$role_name")
            ucode=$(printf '%s' "$uresp" | tail -n1)
            if [ "$ucode" = "200" ]; then
              uri=$(printf '%s' "$uresp" | sed '$d' | jq -r '.uri // empty'); [ -n "$uri" ] && break
            fi
            echo "connection_uri attempt $attempt (db=$db_name role=$role_name): HTTP $ucode — retrying"; sleep 3
          done
          if [ -z "$uri" ]; then
            echo "::error::could not fetch the connection URI for branch $branch_id (db=$db_name role=$role_name)"; exit 1
          fi
          echo "::add-mask::$uri"
          echo "database_url=$uri" >> "$GITHUB_OUTPUT"
          echo "created Neon branch $branch_id ($name)"

      - name: Apply migrations to the ephemeral branch
        env:
          DATABASE_URL: ${{ steps.branch.outputs.database_url }}
        run: pnpm --filter arp-db run db:migrate

      - name: Delete the ephemeral Neon branch
        if: always() && steps.branch.outputs.branch_id != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          curl -sf -X DELETE \
            "$NEON_API/projects/$NEON_PROJECT_ID/branches/${{ steps.branch.outputs.branch_id }}" \
            -H "Authorization: Bearer $NEON_API_KEY" >/dev/null \
            && echo "deleted Neon branch ${{ steps.branch.outputs.branch_id }}" \
            || echo "::warning::failed to delete Neon branch ${{ steps.branch.outputs.branch_id }} — sweep manually"
