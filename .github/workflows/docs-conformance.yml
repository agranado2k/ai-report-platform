name: Docs conformance

# Confirms the spec, ADRs, glossary, events doc, BDD .feature corpus, and the
# OpenAPI document are well-formed and mutually consistent. This is the single
# enforcement seam for the documentation-as-contract policy (ADR-026, ADR-0041);
# the local pre-push hook described in ADR-026 is deliberately deferred.
#
# The harness (scripts/docs-conformance) is dependency-free plain ESM, so no
# install step is needed — only Node. PRD: GitHub issue #13.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  docs-conformance:
    name: Docs conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack + pnpm 10
        run: |
          corepack enable
          corepack prepare pnpm@10.5.0 --activate

      - name: Harness self-tests
        run: pnpm docs:check:test

      - name: Check docs conformance
        run: pnpm docs:check
