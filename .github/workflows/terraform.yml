# Terraform — dedicated infrastructure pipeline.
#
# Separate from ci.yml / cd.yml because:
#   - Different trigger (path filter on infra/terraform/**)
#   - Different secret bundle (Cloudflare/Neon/Upstash tokens, not Vercel app tokens)
#   - Different concurrency (we NEVER want to cancel a running apply)
#   - Clearer failure attribution
#
# On PR: `terraform plan` for shared/prod, in parallel, posts each plan
#        as a sticky comment on the PR via dflook/terraform-plan@v2.
# On push to main: `terraform apply` for shared → prod, sequentially,
#                  via infra/terraform/scripts/tf.sh (ADR-018: Postgres advisory lock).
#
# References: ADR-017 (Terraform for all infra), ADR-018 (R2 state + PG lock),
# ADR-019 (Infrastructure-first delivery), ADR-029 (GHA for CI/CD).

name: Terraform

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write # for plan comments

defaults:
  run:
    shell: bash

env:
  TF_VERSION: "1.14.9"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"

  # ── R2 (Terraform state) ──
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_TF_STATE_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_TF_STATE_SECRET_ACCESS_KEY }}
  R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Postgres advisory lock (ADR-018) ──
  PG_LOCK_URL: ${{ secrets.PG_LOCK_URL }}

  # ── Module inputs (TF_VAR_* picked up by all envs) ──
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_vercel_api_token: ${{ secrets.VERCEL_TOKEN }}
  TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
  TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
  TF_VAR_upstash_email: ${{ secrets.UPSTASH_EMAIL }}
  TF_VAR_upstash_api_key: ${{ secrets.UPSTASH_API_KEY }}

# ─────────────────────────────────────────────────────────────────────────────
# Reusable composite-action-style scripts are inlined in `run` steps below.
# Concurrency:
#   - PR runs: per-PR group with cancel-in-progress (latest push wins)
#   - main runs: never cancel an in-flight apply
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PR FLOW — terraform plan, one job per env, all in parallel
  # ═══════════════════════════════════════════════════════════════════════════

  plan-shared:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: tf-plan-${{ github.event.pull_request.number }}-shared
      cancel-in-progress: true
    env:
      TF_VAR_apex_domain: ${{ vars.APEX_DOMAIN }}
      TF_VAR_operator_email: ${{ vars.OPERATOR_EMAIL }}
      TF_VAR_github_token: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
      TF_VAR_resend_dns_records: ${{ secrets.RESEND_DNS_RECORDS_JSON }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Write backend config
        # dflook/terraform-plan's `backend_config` input only accepts file
        # paths or strict `key=value` pairs — it can't parse HCL like
        # `bucket = "tf-state"`. And the `endpoints` value is a nested map
        # which has no clean key=value form. So we materialize the config
        # as a real HCL file and pass the path.
        run: |
          cat > /tmp/backend-shared.hcl <<EOF
          bucket                      = "tf-state"
          key                         = "shared.tfstate"
          region                      = "auto"
          endpoints                   = { s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" }
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF

      - uses: dflook/terraform-plan@v2
        with:
          path: infra/terraform/envs/shared
          label: "tf-plan: shared"
          add_github_comment: changes-only
          backend_config: /tmp/backend-shared.hcl

  # plan-staging removed: ADR-031 dropped persistent staging. Per-PR previews
  # via Vercel + ephemeral Neon branches cover what staging used to.

  plan-prod:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: tf-plan-${{ github.event.pull_request.number }}-prod
      cancel-in-progress: true
    env:
      TF_VAR_clerk_publishable_key: ${{ vars.CLERK_PUBLISHABLE_KEY_PROD }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Write backend config
        run: |
          cat > /tmp/backend-prod.hcl <<EOF
          bucket                      = "tf-state"
          key                         = "prod.tfstate"
          region                      = "auto"
          endpoints                   = { s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" }
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF

      - uses: dflook/terraform-plan@v2
        with:
          path: infra/terraform/envs/prod
          label: "tf-plan: prod"
          add_github_comment: changes-only
          backend_config: /tmp/backend-prod.hcl

  # ═══════════════════════════════════════════════════════════════════════════
  # MAIN FLOW — terraform apply, shared → staging → prod, sequential
  # Per ADR-018 these run through tf.sh, which acquires the PG advisory lock.
  # ═══════════════════════════════════════════════════════════════════════════

  apply-shared:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: tf-apply-shared
      cancel-in-progress: false # never cancel an apply
    env:
      TF_VAR_apex_domain: ${{ vars.APEX_DOMAIN }}
      TF_VAR_operator_email: ${{ vars.OPERATOR_EMAIL }}
      TF_VAR_github_token: ${{ secrets.GH_REPO_ADMIN_TOKEN }}
      TF_VAR_resend_dns_records: ${{ secrets.RESEND_DNS_RECORDS_JSON }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false # tf.sh handles invocation; we need direct exit codes

      - name: Install psql (for PG advisory lock)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Init
        run: infra/terraform/scripts/tf.sh shared init

      - name: Apply
        run: infra/terraform/scripts/tf.sh shared apply -auto-approve

  # apply-staging removed: see ADR-031. CD chain is now shared → prod direct.

  apply-prod:
    needs: apply-shared
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: tf-apply-prod
      cancel-in-progress: false
    env:
      TF_VAR_clerk_publishable_key: ${{ vars.CLERK_PUBLISHABLE_KEY_PROD }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY_PROD }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Init
        run: infra/terraform/scripts/tf.sh prod init

      - name: Apply
        run: infra/terraform/scripts/tf.sh prod apply -auto-approve

  # ═══════════════════════════════════════════════════════════════════════════
  # Optional: fmt + validate gate, runs on PR alongside the plan jobs.
  # ═══════════════════════════════════════════════════════════════════════════

  fmt-and-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: terraform validate (all envs)
        run: |
          set -e
          for env in shared prod; do
            echo "=== validate $env ==="
            (cd infra/terraform/envs/$env && terraform init -backend=false -input=false && terraform validate)
          done
