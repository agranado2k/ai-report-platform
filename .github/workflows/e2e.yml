name: E2E (BDD)

# Runs the BDD smoke scenario against the live Vercel preview, infrastructure-first
# (ADR-019, ADR-023). Triggered by the Vercel↔GitHub integration's
# deployment_status event so we get the preview URL with no token/polling.
#
# NOTE: deployment_status workflows run from the DEFAULT branch, so this file
# only takes effect once merged to main — it does not self-test on its own PR.
#
# Two Vercel projects (arp-app-prod, arp-view-prod) each emit a deployment_status
# event, so this workflow is invoked twice per commit. Only the app preview
# serves the /health route the smoke hits. Rather than gate the JOB on the app
# preview (which left a confusing "skipped" check from the view-project event),
# a first "Gate" step decides whether to smoke and the remaining steps are
# guarded on its output — so every invocation reports a single, green check, and
# the non-app events simply no-op with a clear log line.
# The 29 product .feature files are not executed yet (no step defs); step
# definitions + a widened features glob land with 1d (upload API) and 1e (viewer).
#
# Issue #149 — smoke reliability: the app preview ALSO gets two
# `deployment_status: success` events per commit — the initial push-triggered
# build (prod-DB fallback, ADR-0047's accepted soft-isolation residual) and
# preview-isolation.yml's force-redeploy (isolated Neon branch + R2_KEY_PREFIX/
# NEON_BRANCH) — indistinguishable from the event alone, so a naive gate ran
# the smoke against BOTH, and the pre-isolation one 500s on the DB-writing
# upload step (and would write to prod). The "Readiness gate" step below reads
# THIS run's own target_url's /health body to tell them apart instead of
# racing them.
#
# The `concurrency` group serializes (does NOT cancel) the two same-SHA
# invocations. `cancel-in-progress: false` is deliberate: the pre-isolation
# and isolated redeploy share the deployment SHA, and their `deployment_status`
# events can arrive in EITHER order (a fast isolated build can finish first).
# With cancel-in-progress:true, a later-arriving pre-isolation event would
# cancel an already-running isolated invocation, which then skips — and the
# isolated deployment would never get smoked at all. Serializing instead means
# whichever arrives second simply waits; each invocation still self-selects via
# its own /health readiness gate, so the isolated deployment is ALWAYS smoked.
concurrency:
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: false

on:
  deployment_status:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E smoke against preview
    runs-on: ubuntu-latest
    steps:
      # Decide whether this deployment_status is the successful APP preview.
      # The event fields are read via env (never interpolated into the script)
      # to avoid command injection from untrusted webhook data.
      - name: Gate — only smoke the app preview
        id: gate
        env:
          DS_STATE: ${{ github.event.deployment_status.state }}
          DS_ENV: ${{ github.event.deployment_status.environment }}
          DS_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          if [ "$DS_STATE" = "success" ] && [ "$DS_ENV" != "Production" ] && [[ "$DS_URL" == *arp-app-prod* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "App preview deploy succeeded — running the smoke."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Not the app preview (state=$DS_STATE env=$DS_ENV) — no smoke to run."
          fi

      - name: Checkout the deployed commit
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node 24
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack + pnpm 10
        if: steps.gate.outputs.run == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.5.0 --activate

      - name: Install (frozen lockfile)
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        if: steps.gate.outputs.run == 'true'
        run: pnpm exec playwright install --with-deps chromium

      # Poll THIS run's own deployment (not a guess) to decide whether it's the
      # ISOLATED redeploy (run the smoke) or the pre-isolation one racing it
      # (skip cleanly). The `isolated` marker (NEON_BRANCH injected by
      # preview-isolation.yml) is the AUTHORITATIVE signal — it's the actual
      # cause of #149 (the pre-isolation deployment has the wrong/mid-flip env).
      #
      # `checks.neon` is ADVISORY ONLY, never a gate/fail condition: /health's
      # DB ping opens a fresh neon-serverless WebSocket OUTSIDE the app's normal
      # request/transaction path, and a Neon preview branch AUTO-SUSPENDS when
      # idle — so the ping can read "error" on a genuinely-healthy deployment
      # whose DB the real scenarios reach fine (Playwright's request timeout
      # tolerates the cold-start wake). We wait a bounded window for neon:"ok"
      # as a courtesy (lets a cold branch warm before the smoke), but proceed on
      # `isolated:true` regardless — a genuinely-unreachable DB then surfaces as
      # a real scenario failure (auth-upload's upload step), not a synthetic gate
      # fail. (Reverses #174's original hard-fail-on-neon, which the /ce-dogfood
      # run showed would fail every isolated run against a suspended branch.)
      #
      # Event fields go through env: (never inlined into the script body),
      # matching the "Gate" step's injection hygiene for untrusted webhook data.
      - name: Readiness gate — is this the isolated redeploy?
        id: readiness
        if: steps.gate.outputs.run == 'true'
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          ever_isolated=false
          neon_ok=false
          tries=40
          interval=3
          for i in $(seq 1 "$tries"); do
            body=$(curl -fsS -m 5 -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$BASE_URL/health" 2>/dev/null || echo '{}')
            isolated=$(printf '%s' "$body" | jq -r '.isolated // false' 2>/dev/null || echo false)
            neon=$(printf '%s' "$body" | jq -r '.checks.neon // "error"' 2>/dev/null || echo error)

            if [ "$isolated" = "true" ]; then
              ever_isolated=true
              # Ideal fast path: isolated AND the DB ping confirms warm — stop
              # waiting and run immediately.
              if [ "$neon" = "ok" ]; then
                neon_ok=true
                break
              fi
            fi
            sleep "$interval"
          done

          # Sleep budget only (tries × interval) — NOT wall-clock: each attempt
          # also spends up to `curl -m 5`, so the real time to this decision can
          # be materially longer (up to ~120s + 40×5s). Log text, not logic.
          elapsed=$((tries * interval))

          if [ "$ever_isolated" = "false" ]; then
            # Never saw isolated:true in the whole window — this is the
            # pre-isolation (prod-fallback) deployment racing the redeploy.
            # Skip cleanly: not a failure, nothing to smoke on this one.
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Not the isolated preview (isolated=false after ${elapsed}s) — skipping smoke."
            exit 0
          fi

          # This IS the isolated deployment → run the smoke. neon is advisory.
          echo "ready=true" >> "$GITHUB_OUTPUT"
          if [ "$neon_ok" = "true" ]; then
            echo "::notice::Isolated deployment, DB ping ok — running the smoke."
          else
            echo "::warning::Isolated deployment reached, but /health DB ping not confirmed ok within ${elapsed}s (advisory — the Neon branch may be cold). Running the smoke anyway; a genuinely-unreachable DB will fail the scenarios."
          fi
          exit 0

      - name: Run BDD smoke against the preview
        if: steps.gate.outputs.run == 'true' && steps.readiness.outputs.ready == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          # Bypasses Vercel Deployment Protection on the preview (else 401).
          # Enable "Protection Bypass for Automation" on both Vercel projects and
          # store the generated secret as this repo secret.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # @auth scenario (ADR-0048): mint a session token for the seeded test
          # user on the STAGING Clerk instance (previews use staging keys). Absent
          # → the @auth scenario is grep-excluded (playwright.config.ts).
          E2E_CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_STAGING }}
          E2E_TEST_USER_EMAIL: ${{ vars.E2E_TEST_USER_EMAIL }}
          # @browser scenario (authenticated editor smoke, tests/e2e/support/
          # clerk-auth.setup.ts): the staging pk_test publishable key — needed
          # client-side so @clerk/clerk-js can initialize window.Clerk for the
          # ticket sign-in. Reuses the EXISTING repo variable
          # CLERK_PUBLISHABLE_KEY_STAGING (the staging pk_test), mirroring how
          # E2E_CLERK_SECRET_KEY maps from the CLERK_SECRET_KEY_STAGING secret —
          # so no new repo variable is needed. A variable, not a secret
          # (publishable keys are meant to reach the browser). Absent → @browser
          # is grep-excluded the same way @auth is (playwright.config.ts).
          E2E_CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY_STAGING }}
        run: pnpm e2e

      - name: Upload Playwright report
        if: steps.gate.outputs.run == 'true' && steps.readiness.outputs.ready == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
