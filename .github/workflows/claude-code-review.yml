name: Claude Code Review

# Automated code review on every PR (Phase 0c.4 / ADR-030 — the Claude
# half of the dual AI-review setup; Gemini half lands separately).
#
# Auth uses `CLAUDE_CODE_OAUTH_TOKEN` (the GitHub App install token) — the
# same proven-working credential that drives the @claude mention bot in
# claude.yml. On a `pull_request` event there's no comment text to use as
# the instruction, so we pass an explicit `prompt:` telling the action to
# post a PR review with inline comments. The action posts review comments
# on the diff; it does NOT commit or push.
#
# permissions: pull-requests write to post the review; the rest read-only.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # write needed: posts the review comments
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Bot review is advisory (solo-developer policy — can't gate merge). Transient
        # Anthropic API outages shouldn't fail the PR check; the review
        # just becomes a no-op for this run.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Post via the workflow's own GITHUB_TOKEN instead of minting a
          # GitHub App token through the OIDC exchange. The OIDC path runs a
          # "workflow file must be identical to the default branch" check,
          # which 401s on any PR that edits this workflow (and stalled the
          # whole review) — github_token sidesteps it entirely.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Force tag mode + a tracking comment so the review reliably attaches
          # to the PR on a pull_request event (no comment text to ride on).
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            First read CLAUDE.md, docs/adr/, and docs/diary.md for the ADRs and project state.
            Post a PR review with inline comments. Specifically flag: ADR-024 (no
            fp-ts/Effect/Remeda; vanilla TS in domain/application), ADR-013 (viewer
            security headers), ADR-014 (service-worker block at edge), Conventional
            Commits violations, and any drift from docs/db-design.md / the glossary.
          claude_args: |
            --max-turns 25
