name: Migrate DB (prod)

# Applies pending Drizzle migrations to the PRODUCTION Neon branch (`main`).
# This is the ONLY path that mutates the prod database — migrations are never
# run by hand (ADR-017, ADR-019). Forward-only; rollback = Neon branch reset /
# PITR (docs/db-design.md).
#
# Two triggers (see `on:`):
#   - push to main on `packages/db/**` — a SCHEMA change → apply it.
#   - workflow_dispatch — on-demand. REQUIRED because the prod schema can be lost
#     by an event that ISN'T a schema-file change: a `terraform apply` that
#     recreates the Neon project/branch. That happened 2026-06 (the prod branch
#     went br-tiny-hall-aqqs1klw → br-wispy-flower-aqtttj6n while reconciling the
#     TF db/role drift), which dropped the already-applied `0000`. Nothing under
#     packages/db changed, so the path trigger never re-ran — leaving the fresh
#     prod branch unmigrated. Dispatching this workflow re-applies pending
#     migrations to the current prod branch. Still CI/CD (the pipeline), NOT a
#     hand-run psql/drizzle.
#
# The prod connection URI is fetched at run time from the Neon API
# (NEON_API_KEY secret + NEON_PROJECT_ID variable) and masked — no long-lived
# DATABASE_URL secret is stored. Prod branch = `main`; the database + owning
# role are discovered from the Neon API at run time. The apply is idempotent
# (drizzle tracks applied migrations in __drizzle_migrations), so a dispatch
# against an already-current branch is a safe no-op.

on:
  workflow_dispatch: # on-demand CI/CD run — e.g. after a Neon branch reset
  push:
    branches: [main]
    # Schema paths only — NOT this workflow file. Editing the workflow must not
    # trigger a prod migration apply (the apply is idempotent, but the trigger
    # should track schema changes, not CI edits).
    paths:
      - "packages/db/**"

permissions:
  contents: read

# Serialize: never let two applies race against prod.
concurrency:
  group: migrate-db-prod
  cancel-in-progress: false

env:
  NEON_API: https://console.neon.tech/api/v2
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

jobs:
  migrate-db:
    name: Migrate prod DB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack + pnpm 10
        run: |
          corepack enable
          corepack prepare pnpm@10.5.0 --activate

      # Not --prod: drizzle-kit + pg are devDependencies, and db:migrate needs them.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # DB-less guard: catch a malformed migration folder/journal before we open
      # a connection to prod.
      - name: Migration folder consistency (drizzle-kit check)
        run: pnpm --filter arp-db run db:check

      - name: Resolve the prod (default) branch connection URI
        id: conn
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          resp=$(curl -s -w $'\n%{http_code}' "$NEON_API/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY")
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          if [ "$code" != "200" ]; then
            echo "::error::Neon list-branches returned HTTP $code"; echo "$body"; exit 1
          fi
          branch_id=$(printf '%s' "$body" | jq -r '.branches[] | select(.default == true) | .id')
          if [ -z "$branch_id" ] || [ "$branch_id" = "null" ]; then
            echo "::error::could not resolve the default (prod) Neon branch"; exit 1
          fi
          # Discover the db + owning role from the branch (don't assume names —
          # the prod branch uses neondb/neondb_owner, not the TF-declared names).
          dbs=$(curl -sf "$NEON_API/projects/$NEON_PROJECT_ID/branches/$branch_id/databases" \
            -H "Authorization: Bearer $NEON_API_KEY")
          db_name=$(printf '%s' "$dbs" | jq -r '.databases[0].name // empty')
          role_name=$(printf '%s' "$dbs" | jq -r '.databases[0].owner_name // empty')
          if [ -z "$db_name" ] || [ -z "$role_name" ]; then
            echo "::error::could not resolve the prod database/role"; exit 1
          fi
          echo "prod branch $branch_id db=$db_name role=$role_name"
          # Connection URI carries the role password — never echo it; mask on success.
          resp=$(curl -s -w $'\n%{http_code}' -G "$NEON_API/projects/$NEON_PROJECT_ID/connection_uri" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            --data-urlencode "branch_id=$branch_id" \
            --data-urlencode "database_name=$db_name" \
            --data-urlencode "role_name=$role_name")
          code=$(printf '%s' "$resp" | tail -n1)
          if [ "$code" != "200" ]; then
            echo "::error::Neon connection_uri returned HTTP $code (body withheld — may contain the URI)"; exit 1
          fi
          uri=$(printf '%s' "$resp" | sed '$d' | jq -r '.uri')
          if [ -z "$uri" ] || [ "$uri" = "null" ]; then
            echo "::error::could not parse the prod connection URI"; exit 1
          fi
          echo "::add-mask::$uri"
          echo "database_url=$uri" >> "$GITHUB_OUTPUT"
          echo "resolved prod branch $branch_id"

      - name: Apply migrations to prod
        env:
          DATABASE_URL: ${{ steps.conn.outputs.database_url }}
        run: pnpm --filter arp-db run db:migrate
