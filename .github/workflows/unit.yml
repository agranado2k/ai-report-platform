name: Unit tests

# Runs the Vitest unit suite (ADR-0042) on every PR. Pure domain/application
# packages need no infrastructure, so this is a fast, hermetic gate that
# complements the infrastructure-first e2e tests (ADR-019).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack + pnpm 10
        run: |
          corepack enable
          corepack prepare pnpm@10.5.0 --activate

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: pnpm --filter "./packages/*" typecheck

      - name: Test
        run: pnpm test
