name: Bot merge (rebase + GPG sign)

# ADR-0035 — preserves both signed-commits (ADR-025) AND rebase-merge
# semantics by sidestepping GitHub's UI rebase button, which cannot sign
# rewritten commits.
#
# Flow: operator comments `/merge` on a green PR. This workflow checks out
# `main`, replays the PR's commits on top of it with `git rebase` (rewriting
# them so they are genuinely re-created), **GPG-signs** each one with the
# merge-bot key, then pushes to `main`.
#
# IMPORTANT (corrected from the original design): the low-level
# `POST /git/commits` REST API does NOT web-flow-sign commits — they come back
# `verified:false / unsigned`, which `require_signed_commits = true` rejects.
# We therefore sign locally with a real GPG key whose public half is registered
# to `agranado2k`, so GitHub marks the commits "Verified".
#
# Required config (one-time operator setup — see docs/ops.md):
#   - secret  MERGE_BOT_TOKEN            fine-grained PAT (Contents RW + PRs RW + Metadata R)
#   - secret  MERGE_BOT_GPG_PRIVATE_KEY  ASCII-armored, PASSPHRASELESS private key
#   - var     MERGE_BOT_NAME             committer name
#   - var     MERGE_BOT_EMAIL            a VERIFIED email on agranado2k that matches the key UID
#   - branch protection: agranado2k in `bypass_pull_request_allowances`
#     (TF `pull_request_bypassers`) so the direct push to `main` is allowed.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Serialize merges on `main` so two concurrent `/merge` comments don't race
  # the push. `cancel-in-progress: false` — never abort a half-finished merge.
  group: bot-merge-main
  cancel-in-progress: false

jobs:
  merge:
    # Only fire on PR comments (not issue comments) containing `/merge`.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/merge')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authorize commenter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          PERM=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" --jq .permission)
          case "$PERM" in
            admin|write|maintain) echo "authorized: $COMMENTER ($PERM)" ;;
            *)
              gh pr comment "${{ github.event.issue.number }}" -R "$REPO" \
                --body "⚠️ Sorry @${COMMENTER}, you need write access to use \`/merge\`. Your permission level is \`${PERM}\`."
              exit 1
              ;;
          esac

      - name: Snapshot PR + validate state
        id: snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR}")
          BASE_SHA=$(echo "$PR_JSON" | jq -r .base.sha)
          STATE=$(echo "$PR_JSON" | jq -r .state)
          MERGEABLE=$(echo "$PR_JSON" | jq -r .mergeable)
          MERGE_STATE=$(echo "$PR_JSON" | jq -r .mergeable_state)

          if [[ "$STATE" != "open" ]]; then
            gh pr comment "$PR" -R "$REPO" --body "⚠️ PR is not open (state=\`${STATE}\`)."; exit 1
          fi
          if [[ "$MERGEABLE" == "false" ]]; then
            gh pr comment "$PR" -R "$REPO" --body "⚠️ PR has merge conflicts. Rebase onto \`main\`, then \`/merge\` again."; exit 1
          fi
          case "$MERGE_STATE" in
            clean|has_hooks|unstable) ;;
            behind)
              gh pr comment "$PR" -R "$REPO" --body "⚠️ PR is behind \`main\`. Rebase onto \`main\` then \`/merge\` again."; exit 1 ;;
            *)
              gh pr comment "$PR" -R "$REPO" --body "⚠️ PR is not mergeable (\`${MERGE_STATE}\`). Checks may still be running or failing."; exit 1 ;;
          esac

          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq .object.sha)
          if [[ "$MAIN_SHA" != "$BASE_SHA" ]]; then
            gh pr comment "$PR" -R "$REPO" --body "⚠️ \`main\` moved (now \`${MAIN_SHA:0:7}\`, PR base is \`${BASE_SHA:0:7}\`). Rebase onto \`main\` then \`/merge\` again."; exit 1
          fi

      - name: Checkout main (full history) as the merge bot
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Persist MERGE_BOT_TOKEN in the remote so the final `git push` is
          # authenticated as the bypass-listed identity.
          token: ${{ secrets.MERGE_BOT_TOKEN }}
          persist-credentials: true

      - name: Import the merge-bot GPG signing key
        env:
          GPG_KEY: ${{ secrets.MERGE_BOT_GPG_PRIVATE_KEY }}
          BOT_NAME: ${{ vars.MERGE_BOT_NAME }}
          BOT_EMAIL: ${{ vars.MERGE_BOT_EMAIL }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_KEY:-}" ]; then
            echo "::error::MERGE_BOT_GPG_PRIVATE_KEY is not set — see docs/ops.md"; exit 1
          fi
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'pinentry-mode loopback\n' >> ~/.gnupg/gpg.conf
          printf 'allow-loopback-pinentry\n' >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent 2>/dev/null || true
          printf '%s' "$GPG_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --keyid-format=long --with-colons | awk -F: '$1=="sec"{print $5; exit}')
          [ -n "$KEYID" ] || { echo "::error::no secret key imported from MERGE_BOT_GPG_PRIVATE_KEY"; exit 1; }
          git config user.signingkey "$KEYID"
          git config commit.gpgsign true
          git config gpg.program gpg
          git config user.name  "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          echo "imported signing key $KEYID for ${BOT_NAME} <${BOT_EMAIL}>"

      - name: Rebase PR commits onto main (GPG-signed) + push
        id: rebase
        env:
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git fetch origin "pull/${PR}/head"
          # Replay the PR's commits onto main, re-creating them so each is
          # GPG-signed. --force-rebase rewrites even though the PR is already
          # linear on main; -S (and commit.gpgsign) signs every commit.
          git checkout -B __bot_merge FETCH_HEAD
          git rebase --force-rebase --gpg-sign origin/main
          git checkout main
          git merge --ff-only __bot_merge
          git push origin HEAD:main
          echo "new_head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify the new HEAD is signed + announce
        env:
          GH_TOKEN: ${{ secrets.MERGE_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          NEW_HEAD: ${{ steps.rebase.outputs.new_head }}
        run: |
          set -euo pipefail
          VERIFIED=$(gh api "repos/${REPO}/commits/${NEW_HEAD}" --jq '.commit.verification.verified')
          REASON=$(gh api "repos/${REPO}/commits/${NEW_HEAD}" --jq '.commit.verification.reason')
          if [[ "$VERIFIED" != "true" ]]; then
            gh pr comment "$PR" -R "$REPO" --body "❗ Pushed to \`main\` (\`${NEW_HEAD:0:7}\`) but it is NOT verified (reason: \`${REASON}\`). Check the GPG key registration on the bot account."
            exit 1
          fi
          gh pr comment "$PR" -R "$REPO" --body "✅ Merged via \`/merge\` — rebased onto \`main\`, GPG-signed (head \`${NEW_HEAD:0:7}\`, verified)."

      - name: Failure notice
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
            --body "❌ \`/merge\` failed at the workflow level. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
