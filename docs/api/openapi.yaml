openapi: 3.1.0
info:
  title: Centaur Spec API
  version: 0.1.0
  description: >
    HTTP API for uploading and serving hosted HTML reports. The HTTP API is the
    source of truth (ADR-003); the MCP server is a thin wrapper over it. Every
    mutating endpoint is idempotent (ADR-0039) and every error is an RFC 9457
    Problem Details document with a stable machine-readable `code` (ADR-0040).
    Phase 1 covers upload + viewer serving (ADR-0037, ADR-0038).
servers:
  - url: https://app.example.com
    description: App origin (replace example.com with the live domain).
tags:
  - name: Reports
    description: Upload, re-upload, and list reports (ADR-0037, ADR-0036).
  - name: Folders
    description: List the org's folder tree (ADR-0036, Reports & Folders).
  - name: Comments
    description: >
      Threaded comments anchored to a location in a report's document
      (ADR-0064, Authoring & Collaboration). Authenticated only — never
      reachable from the public viewer origin.
  - name: Viewer
    description: >
      Public capability-URL serving on the separate view.<domain> origin
      (ADR-0002, ADR-0038). Documented here for contract completeness.

paths:
  /api/v1/reports:
    get:
      operationId: listReports
      tags: [Reports]
      summary: List the acting org's reports (cursor-paginated + searchable)
      description: >
        Returns the signed-in org's reports as a cursor-paginated list envelope
        (`{ object: "list", data, has_more }`, ADR-0053), newest-created first.
        Org-scoped: a caller only ever sees its own org's reports. A session with
        no active organization → 401 (an explicit Problem, not an empty list).
      security:
        - apiKey: []
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Case-insensitive substring matched against title + slug (literal, not a pattern).
        - name: folder_id
          in: query
          required: false
          schema: { type: string, pattern: '^folder_[0-9A-Za-z]{22}$', example: 'folder_3QmK9vXr2pLnB4cD8eF6gH' }
          description: Restrict to one folder. A malformed value → 422.
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/StartingAfter' }
        - { $ref: '#/components/parameters/EndingBefore' }
      responses:
        '200':
          description: A cursor-paginated list of the org's reports (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: uploadReport
      tags: [Reports]
      summary: Upload or re-upload a report (content-only)
      description: >
        Content-only upload (ADR-0037). A bare upload creates a new Report
        (slug + first ReportVersion — the uploader becomes its owner, ADR-0059);
        with `update_slug` it adds a new ReportVersion to an existing Report and
        changes nothing else (ownership-gated: only the owner may re-upload;
        write grants extend this under ADR-0060). Supplying
        `title`, `folder_path`, or `acl` in the body on a re-upload returns 422
        (those are dedicated operations). The response is 201 with
        `scan_status: pending`; the version is promoted to live asynchronously
        on a clean scan (monotonic promote-if-newer), never synchronously.
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    A single .html file OR a .zip bundle. The entry document is
                    resolved by the index.html convention: a lone .html is
                    normalised to index.html and a single wrapping directory is
                    stripped; an ambiguous archive is rejected (422).
                folder_path:
                  type: string
                  description: >
                    CREATE only — placement. Omitted → the org root folder.
                    Present on a re-upload → 422.
                update_slug:
                  type: string
                  description: RE-UPLOAD — the slug of the report to add a version to.
      responses:
        '201':
          description: Version accepted; scanning pending (promotion is asynchronous).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResult' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '402': { $ref: '#/components/responses/PlanLimitExceeded' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
        '409': { $ref: '#/components/responses/IdempotencyInFlight' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/folders:
    get:
      operationId: listFolders
      tags: [Folders]
      summary: List the acting org's folders (cursor-paginated)
      description: >
        Returns the signed-in org's folders as a cursor-paginated list envelope
        (`{ object: "list", data, has_more }`, ADR-0053), newest-created first;
        `parent_id` links them into the tree (Root has a null parent). Org-scoped
        (ADR-0036). A session with no active organization → 401.
      security:
        - apiKey: []
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/StartingAfter' }
        - { $ref: '#/components/parameters/EndingBefore' }
      responses:
        '200':
          description: A cursor-paginated list of the org's folders.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FolderList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: createFolder
      tags: [Folders]
      summary: Create a folder
      description: >
        Create a folder under `parent_id` in the acting org (ADR-0036). The
        parent must exist and belong to your org; folders nest at most 8 levels
        deep. To create a top-level folder, pass the Root folder's id as
        `parent_id` (every folder lives under Root).
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFolderRequest' }
      responses:
        '201':
          description: The created folder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/folders/{id}:
    patch:
      operationId: renameFolder
      tags: [Folders]
      summary: Rename a folder
      description: >
        Change a folder's display name (ADR-0036). The folder must belong to your
        org. The folder's slug is left unchanged (stable identifier).
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^folder_[0-9A-Za-z]{22}$', example: 'folder_3QmK9vXr2pLnB4cD8eF6gH' }
          description: The folder id.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenameFolderRequest' }
      responses:
        '200':
          description: The renamed folder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Folder' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: deleteFolder
      tags: [Folders]
      summary: Delete a folder
      description: >
        Soft-delete a folder (ADR-0036). The folder must belong to your org. The
        Root folder cannot be deleted, and a folder that still contains
        subfolders or reports is rejected (422) — empty it first.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, pattern: '^folder_[0-9A-Za-z]{22}$', example: 'folder_3QmK9vXr2pLnB4cD8eF6gH' }
          description: The folder id.
      responses:
        '204':
          description: Deleted (no content).
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/move:
    post:
      operationId: moveReport
      tags: [Reports]
      summary: Move a report to a different folder
      description: >
        Reassign the report identified by `slug` to the folder `folder_id`
        (ADR-0036). Ownership-gated (ADR-0059): the caller must be the report's
        owner (write grants extend this under ADR-0060), and the target folder
        must belong to the REPORT's org. The slug and the report's versions are
        unchanged.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MoveReportRequest' }
      responses:
        '200':
          description: The moved report resource (its folder_id now updated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/acl:
    get:
      operationId: getReportAcl
      tags: [Reports]
      summary: Read a report's sharing ACL
      description: >
        Return the current sharing ACL for the report identified by `slug` (ADR-0056) as a
        standalone `{ object: "acl", mode, … }` resource — `allowed_emails` + `access_ttl_seconds`
        are present only for `allowlist` mode; the password hash is never returned. OWNER-ONLY
        (ADR-0059): allowlist emails and share config are the owner's business — a non-owner
        (even same-org) gets 403.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      responses:
        '200':
          description: The report's acl resource (`object: "acl"`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Acl' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: setReportAcl
      tags: [Reports]
      summary: Set a report's sharing ACL
      description: >
        Configure who may view the report identified by `slug` (ADR-0056): `public`
        (anyone with the link), `password` (argon2id-hashed), `org` (same-org viewers),
        or `allowlist` (specific emails). Requires the `acl:write` scope and is
        OWNER-ONLY (ADR-0059): only the user who created the report may manage its
        sharing. Returns the report with its updated `acl` (the password hash is
        never returned).
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetAclRequest' }
      responses:
        '200':
          description: The report resource with its updated acl.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/write-grants:
    get:
      operationId: listWriteGrants
      tags: [Reports]
      summary: List a report's write grants
      description: >
        List everyone the owner has granted write access (rename/re-upload/move)
        on the report identified by `slug` (ADR-0060). Requires the `acl:write`
        scope and is OWNER-ONLY — share config is the owner's business, same gate
        as GET /acl.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      responses:
        '200':
          description: A list envelope of write_grant resources.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WriteGrantList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: grantWrite
      tags: [Reports]
      summary: Grant write access to a report
      description: >
        Grant another person the ability to rename, re-upload, or move the report
        identified by `slug` — NOT delete/set_acl/manage grants, which stay
        owner-only (ADR-0060). Requires the `acl:write` scope and is OWNER-ONLY.
        Works CROSS-ORG: the grantee is typically outside the report's org and
        needn't have signed up yet — `grantee_user_id` resolves opportunistically
        now if they already have an account, else the grant matches by email once
        they do. Re-granting the same email upserts in place. Confers NO view
        access by itself (share viewing separately via `set_acl`).
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrantWriteRequest' }
      responses:
        '201':
          description: The created/refreshed write_grant resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WriteGrant' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/write-grants/{email}:
    delete:
      operationId: revokeWrite
      tags: [Reports]
      summary: Revoke a report's write grant
      description: >
        Revoke a previously granted write access (ADR-0060). Requires the
        `acl:write` scope and is OWNER-ONLY. Idempotent — revoking an email with
        no grant still 204s. `email` is URL-encoded and normalized
        (case/whitespace-insensitive) before the lookup.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
        - name: email
          in: path
          required: true
          schema: { type: string, format: email }
          description: The grantee's email (URL-encoded).
      responses:
        '204': { description: Revoked (or no grant existed — idempotent). }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/versions:
    get:
      operationId: listReportVersions
      tags: [Reports]
      summary: List a report's version history (cursor-paginated)
      description: >
        Returns the report's `ReportVersion` history as a cursor-paginated list
        envelope (`{ object: "list", data, has_more }`, ADR-0053, ADR-0065),
        newest-created first. Auth is IDENTICAL to `GET /api/v1/reports/{slug}` —
        org-scoped; a report outside your org reads as not-found. A read-only
        discovery surface — it grants no new write capability. CORS-enabled
        for `VIEW_ORIGIN` (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). When
            authenticating with an `editToken`, this MUST be the CANONICAL
            slug the token was minted for (ADR-0063) — a `report_…` External
            Id is rejected on that auth path.
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/StartingAfter' }
        - { $ref: '#/components/parameters/EndingBefore' }
      responses:
        '200':
          description: A cursor-paginated list of the report's versions (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: saveEditedVersion
      tags: [Reports]
      summary: Save an edit as a new version
      description: >
        Re-assembles the report's current presentation shell around the
        submitted ProseMirror document, saves it as a NEW `ReportVersion`
        through the standard ADR-0037 upload pipeline (`origin: "editor"`,
        with the lossless `_source.json` sidecar, ADR-0062 §4/§5), and
        re-enters the ADR-012 scan gate identically to any other upload —
        there is no unscanned fast path for an edit. This is always a SAVE
        to an EXISTING report (via the same re-upload mechanism `update_slug`
        drives) — there is no create path here. Auth: `apiKey`, a Clerk
        session, OR (ADR-0063) a slug-bound `editToken` carrying ONLY
        `reports:write` — every path re-checks `canWrite` LIVE
        (`isOwner OR hasWriteGrant`, ADR-0059 §2 / ADR-0060 §4).
        CORS-enabled for `VIEW_ORIGIN` (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveEditedVersionRequest' }
      responses:
        '201':
          description: The saved version, as the created `report` resource (mirrors POST /api/v1/reports).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResult' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/diff:
    get:
      operationId: getReportDiff
      tags: [Reports]
      summary: Diff two of a report's versions (JSON)
      description: >
        The visual diff between two versions, as JSON (ADR-0063 API slice,
        ADR-0065 §3/§4) — the cross-origin, machine-readable counterpart to
        the dashboard's HTML diff page. Structural (word-level) when BOTH
        versions carry a parseable `_source.json` sidecar; a labeled,
        lower-fidelity HTML fallback otherwise (`diff_mode` on the response
        distinguishes the two — deliberately NOT named `mode`, which is
        reserved for the deployment context on every resource, ADR-0053).
        Addresses versions by their `version_…` External Id, not a display
        ordinal. Auth: `apiKey`, a Clerk session, OR (ADR-0063) a slug-bound
        `editToken` — read access is the SAME org-visible-or-write-grantee
        seam as `GET /api/v1/reports/{slug}`. CORS-enabled for `VIEW_ORIGIN`
        (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
        - name: from
          in: query
          required: true
          schema: { type: string, pattern: '^version_[0-9A-Za-z]{22}$' }
          description: The OLDER version's External Id.
        - name: to
          in: query
          required: true
          schema: { type: string, pattern: '^version_[0-9A-Za-z]{22}$' }
          description: The NEWER version's External Id.
      responses:
        '200':
          description: The computed diff.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportDiff' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/edit-token:
    post:
      operationId: refreshEditToken
      tags: [Reports]
      summary: Silently refresh an in-flight editing session's edit token
      description: >
        Issues a FRESH, slug-bound `scope:"edit"` token to a caller
        presenting a CURRENTLY-VALID one (ADR-0063 Phase 5), so an editing
        session can keep itself alive past the 15-minute edit-token TTL
        without a full round-trip back through `GET /reports/{slug}/open`.
        Auth is the SAME `editToken` seam as every other edit-token
        endpoint on this API — `canWrite` (`isOwner OR hasWriteGrant`,
        ADR-0060 §4) is re-checked LIVE a SECOND time here (belt-and-braces,
        mirroring `POST /api/v1/reports/{slug}/versions`'s own re-check),
        so a revoked write grant or a lost ownership denies the refresh
        (403), not just future saves. The new token's `sub` is always the
        freshly re-checked actor — never echoed from the presented token's
        own claims. CORS-enabled for `VIEW_ORIGIN` (ADR-0063).


        **Security trade-off (flagged for `/security-review`):** making an
        edit token refreshable for as long as `canWrite` holds means a
        LEAKED token is also refreshable, extending its effective life
        beyond the original TTL for as long as the thief keeps refreshing it
        before the grant is revoked. Mitigated by the token's narrow
        `reports:write`-only, single-report scope, the LIVE re-check on
        every refresh (revocation cuts it off within one remaining TTL), and
        the view origin's CSP + sandboxed report iframe that's supposed to
        keep the token out of reach in the first place. See ADR-0063's Phase
        5 entry for the full writeup, including a flagged-but-not-built
        recommendation (an absolute session cap).
      security:
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). MUST be
            the CANONICAL slug the presented `editToken` was minted for
            (ADR-0063) — a `report_…` External Id is rejected on this path.
      responses:
        '200':
          description: The freshly-minted edit token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EditToken' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}:
    get:
      operationId: getReport
      tags: [Reports]
      summary: Get a report
      description: >
        Fetch a single report by slug (ADR-0038). The report must belong to your
        org, OR you must hold a write grant on it (a cross-org grantee's
        metadata carve-out, ADR-0059 §3 / ADR-0060 §4). Returns the full report
        resource — the list summary plus `owner` and (owner-only) `acl`.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      responses:
        '200':
          description: The report (with its acl).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: renameReport
      tags: [Reports]
      summary: Rename a report
      description: >
        Change a report's display title (ADR-0038). Ownership-gated (ADR-0059):
        the caller must be the report's owner (write grants extend this under
        ADR-0060). The slug is permanent and unaffected.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenameReportRequest' }
      responses:
        '200':
          description: The renamed report (with its acl).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: deleteReport
      tags: [Reports]
      summary: Delete a report
      description: >
        Soft-delete a report (ADR-0038). OWNER-ONLY (ADR-0059): only the user who
        created the report may delete it. The viewer then returns 410 Gone; the
        slug + bytes are retained for the appeal/purge window.
      security:
        - apiKey: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
      responses:
        '204':
          description: Deleted (no content).
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/comments:
    get:
      operationId: listComments
      tags: [Comments]
      summary: List a report's comments (cursor-paginated)
      description: >
        Returns the report's `Comment`s (roots and replies interleaved; thread
        client-side via `parent_id`) as a cursor-paginated list envelope
        (ADR-0053, ADR-0064 §7), newest-created first. Auth is IDENTICAL to
        `GET /api/v1/reports/{slug}` — org-scoped (ADR-0059 §3). Comments are
        workspace collaboration data — NEVER reachable from the public viewer
        origin (ADR-0064 §4). CORS-enabled for `VIEW_ORIGIN` (ADR-0063) — the
        edit-token-authenticated caller IS reachable, only the anonymous
        public viewer route is excluded.
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/StartingAfter' }
        - { $ref: '#/components/parameters/EndingBefore' }
      responses:
        '200':
          description: A cursor-paginated list of the report's comments (possibly empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentList' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: createComment
      tags: [Comments]
      summary: Create a comment, or reply to one
      description: >
        Creates a root comment (starts a Thread), or — when the body carries
        `parent_comment_id` — a reply to that root. Single-level threading
        (ADR-0064 Decision 2/4): replying to a reply is a 422. Gated by
        `canWrite` (ADR-0064 §3 — the SAME seam as rename/re-upload/move:
        `isOwner OR hasWriteGrant`, ADR-0060 §4), not the stricter owner-only
        delete/setAcl seam. CORS-enabled for `VIEW_ORIGIN` (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCommentRequest' }
      responses:
        '201':
          description: The created comment (or reply) resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/reports/{slug}/comments/{comment_id}:
    patch:
      operationId: resolveComment
      tags: [Comments]
      summary: Resolve a comment
      description: >
        Marks a comment resolved (ADR-0064 §3). Idempotent — resolving an
        already-resolved comment is a no-op. Authorized by a DIFFERENT rule
        than create/reply: the comment's AUTHOR or the report's OWNER (not
        `canWrite`) — the owner moderates every comment on their report. An
        `editToken` actor resolves under their real, mirrored `userId`, so
        this rule applies to them identically. CORS-enabled for
        `VIEW_ORIGIN` (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
        - name: comment_id
          in: path
          required: true
          schema: { type: string, pattern: '^comment_[0-9A-Za-z]{22}$' }
          description: The comment's External Id (ADR-0052).
      responses:
        '200':
          description: The resolved comment resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: deleteComment
      tags: [Comments]
      summary: Delete a comment
      description: >
        Hard-deletes a comment (ADR-0064 §3). Deleting a root also deletes its
        replies (the DB's self-FK `ON DELETE CASCADE`). Same author-or-owner
        authorization as resolve. CORS-enabled for `VIEW_ORIGIN` (ADR-0063).
      security:
        - apiKey: []
        - editToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: >
            The report's permanent capability-URL slug (nanoid(10)). With an
            `editToken`, this MUST be the CANONICAL slug the token was
            minted for (ADR-0063).
        - name: comment_id
          in: path
          required: true
          schema: { type: string, pattern: '^comment_[0-9A-Za-z]{22}$' }
          description: The comment's External Id (ADR-0052).
      responses:
        '204':
          description: Deleted (no content).
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /{slug}:
    get:
      operationId: viewReport
      tags: [Viewer]
      summary: Serve a report (view.<domain> origin)
      description: >
        Reason-opaque viewer state machine (ADR-0038). Served on the separate
        PSL-isolated view.<domain> origin with the full ADR-0013 security-header
        stack and X-Robots-Tag: noindex (always). `?v=N` passes through the same
        ACL + scan gate as the live URL.
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
        - name: v
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
          description: Serve a specific version ordinal instead of the live version.
      responses:
        '200':
          description: >
            A clean version is streamed, OR a "scanning… check back" holding page
            is shown when the newest version is still pending.
          content:
            text/html:
              schema: { type: string }
        '404':
          description: >
            Unknown slug OR a blocked version — deliberately indistinguishable
            (reason-opaque; we don't acknowledge serious-bad content).
        '410':
          description: The report was taken down (Gone); no public reason.
        '451':
          description: The relevant version is flagged — unavailable for review.

  /{slug}/edit:
    get:
      operationId: unifiedEditingExperience
      tags: [Viewer]
      summary: The unified in-viewer editing experience (ADR-0063 Decisions 1-3, Phase 5)
      description: >
        The authenticated, first-party-JS editing surface on the viewer
        origin — Edit/View/Comments/Compare behind one edit-token capability
        (`apps/view/app/routes/$slug.edit.tsx`). Supersedes the interim,
        unauthenticated 302-to-dashboard redirect this operation used to
        document (ADR-0063 Decision 3's original fallback) — the dashboard's
        own `/reports/{slug}/edit` page no longer exists (ADR-0063
        "Phase 5-C"). Reached via `GET /reports/{slug}/open` on the app
        origin, which mints a short-lived, slug-bound `scope:"edit"` token
        and redirects here with `?et=<token>`. A `?et=` hand-off sets a
        scoped `arp_edit` cookie and 303s to the clean URL (keeping the token
        out of history/referer); a redeemed cookie renders the editor;
        anything else (missing/invalid/expired token, no configured
        secret/app origin, or no editable document) degrades to a 302 to the
        public, read-only `GET /{slug}` — this route never renders the
        editor without a live, valid capability, and never modifies the
        public route's own behavior.
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: The report's permanent capability-URL slug (nanoid(10)).
        - name: et
          in: query
          required: false
          schema: { type: string }
          description: >
            A freshly-minted edit token from `GET /reports/{slug}/open`
            (app origin). Present only on the initial hand-off; redeemed
            into the `arp_edit` cookie and dropped from the URL immediately.
      responses:
        '200':
          description: The unified editing experience is rendered (a valid, redeemed edit capability).
          content:
            text/html:
              schema: { type: string }
        '302':
          description: >
            No valid edit capability (or the report has nothing editable) —
            degrades to the public viewer at `GET /{slug}`.
        '303':
          description: A valid `?et=` hand-off was redeemed into a cookie; redirects to the clean `/{slug}/edit` URL.
        '404':
          description: The slug does not have a valid shape.

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: >
        API key (ADR-0008) carrying the `reports:write` scope (ADR-0016).
        Hashed, prefixed, user-scoped so cross-org collaboration works.
    editToken:
      type: http
      scheme: bearer
      description: >
        Slug-bound, single-purpose edit token (ADR-0063), minted by the app
        for a user with `canWrite` on ONE specific report. Grants ONLY the
        `reports:write` scope on that report — never `acl:write` (grant/
        revoke/setAcl/listWriteGrants stay apiKey/Clerk-session-only).
        `canWrite` is re-checked LIVE on every accept (a grant revoked after
        mint rejects on the next call, not just the next mint), and the
        request path's `slug` MUST be the CANONICAL slug the token was
        minted for. Accepted as an alternative to `apiKey` on the
        report-editing surface only (save a version, read a diff, list/add/
        resolve/delete comments, list versions) — every other endpoint stays
        apiKey/Clerk-session-only. These endpoints are additionally
        CORS-enabled for the configured `VIEW_ORIGIN` (echoed
        `Access-Control-Allow-Origin`, never `*`, no
        `Access-Control-Allow-Credentials` — auth rides this Bearer header,
        never a cookie) so a cross-origin view.<domain> caller can use them
        directly.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }
      description: >
        Optional idempotency key (ADR-0039, IETF/Stripe style). If absent, the
        server derives one from acting_user_id + method + route + a canonical
        payload fingerprint (for upload: content_hash + target). A match replays
        the stored response without re-executing; an explicit key reused with a
        different body → 422; a concurrent in-flight retry → 409. Keys live 24h.
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Max items per page (ADR-0053). Out-of-range / non-numeric is clamped to 1..100.
    StartingAfter:
      name: starting_after
      in: query
      required: false
      schema: { type: string }
      description: >
        Cursor (ADR-0053): a prefixed id (report_… / folder_…). Returns the items
        AFTER it in newest-created-first order (page forward). A malformed id → 422.
    EndingBefore:
      name: ending_before
      in: query
      required: false
      schema: { type: string }
      description: >
        Cursor (ADR-0053): a prefixed id. Returns the items BEFORE it (page back).
        Mutually exclusive with starting_after. A malformed id → 422.

  schemas:
    UploadResult:
      description: The created `report` resource (ADR-0053).
      type: object
      required: [object, slug, view_url, version, scan_status, mode]
      properties:
        object: { type: string, enum: [report] }
        id:
          type: string
          pattern: '^report_[0-9A-Za-z]{22}$'
          example: report_7KpQ2mX9vR4nB6cD8eF1gH
          description: >
            The report's External Id (ADR-0052) — present on a create or re-upload,
            omitted only on an idempotent replay (the stored response). Address by `slug`.
        slug:
          type: string
          description: Permanent capability-URL slug (nanoid(10), ~10^18 entropy).
        view_url:
          type: string
          format: uri
          description: Public viewer URL on view.<domain>.
        version:
          type: integer
          description: Display ordinal (version_no = max+1 at commit).
        scan_status:
          type: string
          enum: [pending, clean, flagged, blocked]
          description: Always `pending` at upload; the verdict arrives asynchronously.
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    ReportList:
      description: A cursor-paginated list of reports (ADR-0053 list envelope).
      type: object
      required: [object, data, has_more]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: '#/components/schemas/ReportSummary' }
        has_more:
          type: boolean
          description: True if more items follow; page on with `starting_after` = the last id.

    ReportSummary:
      description: A `report` resource — summary projection (ADR-0036, ADR-0053).
      type: object
      required: [object, id, slug, title, is_published, folder_id, mode]
      properties:
        object: { type: string, enum: [report] }
        id:
          type: string
          pattern: '^report_[0-9A-Za-z]{22}$'
          example: report_7KpQ2mX9vR4nB6cD8eF1gH
          description: The report's External Id (ADR-0052) — for authenticated API addressing.
        slug:
          type: string
          description: Permanent capability-URL slug (nanoid(10)) — the viewer / public handle.
        title: { type: string }
        is_published:
          type: boolean
          description: True when a clean version is live (servable at the viewer URL).
        folder_id:
          type: string
          pattern: '^folder_[0-9A-Za-z]{22}$'
          description: The Folder the report is currently placed in.
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    VersionList:
      description: A cursor-paginated list of a report's versions (ADR-0053/ADR-0065 list envelope).
      type: object
      required: [object, data, has_more]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: '#/components/schemas/VersionSummary' }
        has_more:
          type: boolean
          description: True if more items follow; page on with `starting_after` = the last id.

    VersionSummary:
      description: A `version` resource — the ReportVersionSummary projection (ADR-0065).
      type: object
      required:
        [object, id, version_no, uploaded_by, uploaded_at, scan_status, size_bytes, origin, mode]
      properties:
        object: { type: string, enum: [version] }
        id:
          type: string
          pattern: '^version_[0-9A-Za-z]{22}$'
          example: version_9nQ4mK2vR7pXtB6cD1eF8g
          description: The version's External Id (ADR-0052).
        version_no:
          type: integer
          description: Display ordinal (max+1 at commit, ADR-0037 §6).
        uploaded_by:
          type: string
          pattern: '^user_[0-9A-Za-z]{22}$'
          example: user_5mK9pQ2vR4nXtB6cD8eF1g
          description: The user who created this version, as a `user_…` External Id (ADR-0052).
        uploaded_at:
          type: string
          format: date-time
          description: When this version was created.
        scan_status:
          type: string
          enum: [pending, clean, flagged, blocked]
          description: The cached malware/abuse scan verdict (ADR-0037 §9).
        size_bytes:
          type: integer
          description: Uncompressed total size of the version's bundle.
        origin:
          type: string
          enum: [upload, editor]
          description: >
            How this version was produced (ADR-0062 §6, ADR-0065). `editor` —
            produced by `POST /api/v1/reports/{slug}/versions`, which the
            unified in-viewer editing experience's save action calls
            (ADR-0063); `upload` — every other create/re-upload path.
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    SaveEditedVersionRequest:
      description: >
        Body for `POST /api/v1/reports/{slug}/versions` (ADR-0062 §5,
        ADR-0063). The `doc` is opaque here — a `Report HTML schema`-conforming
        ProseMirror document JSON (see `docs/domain-glossary.md`), re-assembled
        server-side around the report's current presentation shell.
      type: object
      required: [doc]
      properties:
        doc:
          type: object
          description: The edited ProseMirror document JSON.

    EditToken:
      description: >
        The `edit_token` resource (ADR-0063 Phase 5) —
        `POST /api/v1/reports/{slug}/edit-token`'s response. Carries no
        prefixed External Id and no deployment `mode` — it's a bearer
        capability, not an addressable object.
      type: object
      required: [object, edit_token, expires_at]
      properties:
        object: { type: string, enum: [edit_token] }
        edit_token:
          type: string
          description: >
            The freshly-minted, slug-bound, `scope:"edit"` bearer token
            (packages/domain/src/edit-token.ts). Use it exactly like the
            token `GET /reports/{slug}/open` mints — as
            `Authorization: Bearer <edit_token>` on subsequent
            `editToken`-authenticated calls.
        expires_at:
          type: integer
          description: Epoch seconds this token expires at (mint time + the standard edit-token TTL).

    ReportDiff:
      description: >
        The `report_diff` resource (ADR-0063 API slice, ADR-0065 §3/§4) —
        `GET /api/v1/reports/{slug}/diff`'s response.
      type: object
      required: [object, diff_mode, html, label, from, to, mode]
      properties:
        object: { type: string, enum: [report_diff] }
        diff_mode:
          type: string
          enum: [structural, fallback]
          description: >
            `structural` — a word-level ProseMirror diff (both versions carried
            a parseable `_source.json` sidecar). `fallback` — a labeled,
            lower-fidelity block-level HTML diff (at least one version lacked a
            sidecar, e.g. an externally-uploaded version, or its sidecar was
            corrupt). Deliberately NOT named `mode` — that field means the
            deployment context on every resource (ADR-0053); this is a
            different axis (diff fidelity).
        html:
          type: string
          description: The rendered diff markup (structural or fallback).
        label:
          type: string
          nullable: true
          description: A human-readable caption, present only when `diff_mode` is `fallback`.
        from:
          type: object
          required: [id, version_no]
          properties:
            id:
              type: string
              pattern: '^version_[0-9A-Za-z]{22}$'
              description: The OLDER version's External Id.
            version_no: { type: integer, description: Its display ordinal. }
        to:
          type: object
          required: [id, version_no]
          properties:
            id:
              type: string
              pattern: '^version_[0-9A-Za-z]{22}$'
              description: The NEWER version's External Id.
            version_no: { type: integer, description: Its display ordinal. }
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    Acl:
      description: >
        A report's sharing configuration (ADR-0056). The argon2id password hash is
        NEVER serialized; `allowed_emails` is present only for `allowlist` mode.
      type: object
      required: [mode]
      properties:
        object:
          type: string
          enum: [acl]
          description: Resource type discriminator (ADR-0053). Present on the standalone GET /acl response; omitted when embedded in a report resource.
        mode:
          type: string
          enum: [private, public, password, org, allowlist]
          description: Who may view the report (ADR-0056).
        allowed_emails:
          type: array
          items: { type: string, format: email }
          description: The allowlisted viewer emails (allowlist mode only).
        access_ttl_seconds:
          type: integer
          minimum: 60
          maximum: 7776000
          description: Owner-set access duration for redeemed magic-link grants (allowlist mode only), ADR-0056.

    Report:
      description: >
        A single `report` resource (ADR-0056, ADR-0059) — the ReportSummary projection
        plus its `owner` and, for the owner only, its `acl`. Returned by the
        single-report endpoints (get/move/rename/set_acl); list endpoints return the
        acl-free ReportSummary.
      allOf:
        - $ref: '#/components/schemas/ReportSummary'
        - type: object
          required: [owner]
          properties:
            acl:
              allOf:
                - $ref: '#/components/schemas/Acl'
              description: >
                Present ONLY when the caller is the report's owner (ADR-0059 §3) —
                share config (incl. allowlist emails) is the owner's business. Org
                members receive the resource without this block.
            owner:
              type: string
              description: >
                The owning user's `user_…` External Id (ADR-0052, ADR-0059) — the user
                who created the report. Writes are ownership-gated; org members see the
                report in lists but only the owner may delete it or manage its sharing.

    CommentList:
      description: A cursor-paginated list of a report's comments (ADR-0053/ADR-0064 list envelope).
      type: object
      required: [object, data, has_more]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: '#/components/schemas/Comment' }
        has_more:
          type: boolean
          description: True if more items follow; page on with `starting_after` = the last id.

    Anchor:
      description: >
        The two-part, degrading location a comment attaches to (ADR-0064 §2a).
        v1 always carries `version_pinned`; `relative` is an opaque, optional
        Yjs-relative-position payload the editor slice will populate later —
        untyped on the wire, passed through as given.
      type: object
      required: [version_pinned]
      properties:
        version_pinned:
          type: object
          required: [version_id, text_quote]
          properties:
            version_id:
              type: string
              pattern: '^version_[0-9A-Za-z]{22}$'
              description: The `ReportVersion` this comment was anchored against.
            text_quote:
              type: string
              description: A snapshot of the anchored text (max 2000 chars) — shown even once the anchor can no longer resolve live.
        relative:
          description: Opaque Yjs-relative-position payload (ADR-0067) — reserved, unused until the editor slice lands.

    Comment:
      description: A `comment` resource — the `Comment` aggregate on the wire (ADR-0064).
      type: object
      required: [object, id, report_id, author_id, parent_id, body, anchor, resolved_at, created_at, mode]
      properties:
        object: { type: string, enum: [comment] }
        id:
          type: string
          pattern: '^comment_[0-9A-Za-z]{22}$'
          example: comment_9nQ4mK2vR7pXtB6cD1eF8g
          description: The comment's External Id (ADR-0052).
        report_id:
          type: string
          pattern: '^report_[0-9A-Za-z]{22}$'
        author_id:
          type: string
          pattern: '^user_[0-9A-Za-z]{22}$'
          description: The comment's author, as a `user_…` External Id (ADR-0052).
        parent_id:
          type: [string, 'null']
          pattern: '^comment_[0-9A-Za-z]{22}$'
          description: Null for a root comment (starts a Thread); set for a reply (ADR-0064 Decision 2 — single-level, so this is always a ROOT comment's id).
        body:
          type: string
          description: Bounded to 2000 characters (JUDGMENT CALL — ADR-0064 gives no exact number).
        anchor: { $ref: '#/components/schemas/Anchor' }
        resolved_at:
          type: [string, 'null']
          format: date-time
          description: Null = open; set = resolved.
        created_at:
          type: string
          format: date-time
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    CreateCommentRequest:
      description: >
        Create a root comment, or (with `parent_comment_id`) reply to one.
        Single-level threading — a `parent_comment_id` that is itself a reply
        is rejected (422).
      type: object
      required: [body, anchor]
      properties:
        body:
          type: string
          description: The comment text (max 2000 chars).
        anchor: { $ref: '#/components/schemas/Anchor' }
        parent_comment_id:
          type: string
          pattern: '^comment_[0-9A-Za-z]{22}$'
          description: Omit to create a root comment; set to reply to that root.

    FolderList:
      description: A cursor-paginated list of folders (ADR-0053 list envelope).
      type: object
      required: [object, data, has_more]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: '#/components/schemas/Folder' }
        has_more:
          type: boolean
          description: True if more items follow; page on with `starting_after` = the last id.

    Folder:
      description: A `folder` resource — a tree-structured organizing unit (ADR-0036, ADR-0053).
      type: object
      required: [object, id, name, slug, parent_id, mode]
      properties:
        object: { type: string, enum: [folder] }
        id: { type: string, pattern: '^folder_[0-9A-Za-z]{22}$', example: 'folder_3QmK9vXr2pLnB4cD8eF6gH' }
        name: { type: string }
        slug:
          type: string
          description: URL-safe folder slug, unique among siblings within the org.
        parent_id:
          type: [string, 'null']
          pattern: '^folder_[0-9A-Za-z]{22}$'
          description: Parent folder id; null for the org Root folder.
        mode:
          type: string
          enum: [prod, dev]
          description: The deployment the resource belongs to — "prod" (live) or "dev" (preview/dev), ADR-0053.

    CreateFolderRequest:
      type: object
      required: [name, parent_id]
      properties:
        name:
          type: string
          description: Display name for the new folder.
        parent_id:
          type: string
          pattern: '^folder_[0-9A-Za-z]{22}$'
          description: Parent folder id (use the Root folder's id for a top-level folder).

    RenameFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: The folder's new display name.

    RenameReportRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          description: The report's new display title.

    SetAclRequest:
      description: Set a report's sharing Acl (ADR-0056). `password` is required for `password` mode; `allowed_emails` (≥1) for `allowlist`.
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [private, public, password, org, allowlist]
        password:
          type: string
          description: Plaintext password (password mode only); hashed argon2id server-side, never stored or returned.
        allowed_emails:
          type: array
          items: { type: string, format: email }
          description: Allowlisted viewer emails (allowlist mode only).
        access_ttl_seconds:
          type: integer
          minimum: 60
          maximum: 7776000
          description: Owner access duration for allowlist grants (allowlist mode only); defaults to 7 days when omitted. ADR-0056.

    MoveReportRequest:
      type: object
      required: [folder_id]
      properties:
        folder_id:
          type: string
          pattern: '^folder_[0-9A-Za-z]{22}$'
          description: Target folder id; must belong to the report's org.

    WriteGrant:
      description: >
        A per-report write grant (ADR-0060) — lets `email` rename, re-upload, or
        move the report. No surrogate id: wire-addressed by `(slug, email)`, not
        a prefixed id.
      type: object
      required: [object, email, granted_by, granted_at]
      properties:
        object: { type: string, enum: [write_grant] }
        email:
          type: string
          format: email
          description: The grantee's normalized email.
        granted_by:
          type: string
          description: The granting owner's `user_…` External Id (ADR-0052).
        granted_at:
          type: string
          format: date-time
          description: When the grant was created (or last refreshed by a re-grant).

    WriteGrantList:
      description: A list of a report's write grants (ADR-0053 list envelope).
      type: object
      required: [object, data, has_more]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: '#/components/schemas/WriteGrant' }
        has_more:
          type: boolean
          description: Always false today — write grants aren't paginated (a small, per-report roster).

    GrantWriteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: The grantee's email address.

    Problem:
      description: RFC 9457 Problem Details (ADR-0040).
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, default: about:blank }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          description: Stable, documented machine-readable error code.
          enum:
            - unauthenticated
            - forbidden
            - not_found
            - method_not_allowed
            - unsupported_media_type
            - payload_too_large
            - validation_error
            - idempotency_key_reuse
            - idempotency_in_flight
            - plan_limit_exceeded
            - rate_limited
            - internal_error

  responses:
    Unauthenticated:
      description: Missing or invalid API key.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Unauthenticated, status: 401, code: unauthenticated }
    Forbidden:
      description: Authenticated but not allowed (no write grant, or insufficient scope).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Forbidden, status: 403, code: forbidden }
    NotFound:
      description: Slug, folder, or version not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Not found, status: 404, code: not_found }
    MethodNotAllowed:
      description: The endpoint exists but does not support this HTTP method (only POST).
      headers:
        Allow:
          schema: { type: string }
          description: The methods the endpoint supports.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Method not allowed, status: 405, code: method_not_allowed }
    PlanLimitExceeded:
      description: A hard plan quota was hit (billing-actionable; distinct from 429).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Plan limit exceeded, status: 402, code: plan_limit_exceeded }
    PayloadTooLarge:
      description: Per-file / bundle-size / file-count cap or a decompression bomb.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Payload too large, status: 413, code: payload_too_large }
    UnsupportedMediaType:
      description: MIME not on the allowlist (content-sniffed), e.g. SVG (ADR-0015).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Unsupported media type, status: 415, code: unsupported_media_type }
    ValidationError:
      description: >
        Bad body, missing/ambiguous entry document, or a content-only violation
        (title/folder_path/acl on re-upload). Also returned for an explicit
        Idempotency-Key reused with a different body (code idempotency_key_reuse).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Validation error, status: 422, code: validation_error }
    IdempotencyInFlight:
      description: A retry arrived while the original request is still processing.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Request in flight, status: 409, code: idempotency_in_flight }
    RateLimited:
      description: Too many requests (transient; clears with time, unlike 402).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Rate limited, status: 429, code: rate_limited }
    InternalError:
      description: Unexpected server error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example: { type: about:blank, title: Internal server error, status: 500, code: internal_error }
